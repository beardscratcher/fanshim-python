[metadata]
name = fanshim
version = 0.1.0
author = Nick Skelton
author_email = nickcmskelton+claude@gmail.com
description = Python library for the Pimoroni Fan Shim for Raspberry Pi (lgpio fork)
long_description = file: README.md
long_description_content_type = text/markdown
keywords = Raspberry Pi
url = https://github.com/beardscratcher/fanshim-python
project_urls =
	GitHub=https://github.com/beardscratcher/fanshim-python
license = MIT
license_files = LICENSE.txt
classifiers =
	Development Status :: 4 - Beta
	Operating System :: POSIX :: Linux
	License :: OSI Approved :: MIT License
	Intended Audience :: Developers
	Programming Language :: Python :: 3
	Programming Language :: Python :: 3.11
	Programming Language :: Python :: 3.12
	Programming Language :: Python :: 3.13
	Topic :: Software Development
	Topic :: Software Development :: Libraries
	Topic :: System :: Hardware

[options]
python_requires = >= 3.11
packages = fanshim
install_requires =
	apa102 >= 0.0.3

[flake8]
exclude =
	.tox,
	.eggs,
	.git,
	__pycache__,
	build,
	dist
ignore =
	E501

[pimoroni]
py3deps =
	python3-rpi.gpio
	python3-setuptools
	python3-dev
	python3-psutil
py2deps =
	python-rpi.gpio
	python-setuptools
	python-dev
	python-psutil
commands =
	printf "Enjoy your Fan SHIM!\n"
configtxt =
